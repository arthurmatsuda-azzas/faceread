<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>FaceRead · Somalabs</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"><style>:root{--bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--accent:#c8f135;--accent2:#ff4d6d;--text:#f0f0f0;--muted:#555;--card:#161616}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}.logo{display:flex;align-items:center;gap:10px}.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#0a0a0a}.logo-text{display:flex;flex-direction:column;line-height:1}.logo-title{font-size:14px;font-weight:700;letter-spacing:.04em}.logo-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-top:2px}.status-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);transition:all .3s}.status-pill.active{border-color:var(--accent);color:var(--accent)}.status-pill.analyzing{border-color:#f0a500;color:#f0a500}.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}.status-pill.active .status-dot{animation:pulse 1.2s infinite}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:14px}.camera-wrap{position:relative;width:100%;aspect-ratio:3/4;max-height:42dvh;background:var(--surface);border-radius:16px;overflow:hidden;border:1px solid var(--border);flex-shrink:0}#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block}#canvas{display:none}.cam-overlay{position:absolute;inset:0;pointer-events:none}.corner{position:absolute;width:24px;height:24px;border-color:var(--accent);border-style:solid;opacity:.7}.corner.tl{top:12px;left:12px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}.corner.tr{top:12px;right:12px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}.corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}.corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}.scan-line{position:absolute;left:12px;right:12px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);top:12px;opacity:0;transition:opacity .3s}.scanning .scan-line{opacity:1;animation:scan 1.8s ease-in-out infinite}@keyframes scan{0%{top:12px}100%{top:calc(100% - 12px)}}.cam-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.06em}.no-face-badge{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(255,77,109,.15);border:1px solid var(--accent2);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--accent2);white-space:nowrap;opacity:0;transition:opacity .3s}.controls{display:flex;gap:10px;flex-shrink:0}.btn{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.02em}.btn:active{transform:scale(.97)}.btn-primary{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:700}.btn-primary:disabled{background:#2a2a2a;color:var(--muted);border-color:var(--border);cursor:not-allowed}.btn-stop{background:rgba(255,77,109,.1);border-color:var(--accent2);color:var(--accent2);flex:0 0 auto;padding:14px 20px}.interval-row{display:flex;align-items:center;gap:8px;flex-shrink:0}.interval-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;letter-spacing:.06em}.interval-chips{display:flex;gap:6px}.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s}.chip.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:500}.result-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;min-height:0;padding-bottom:8px}.result-area::-webkit-scrollbar{display:none}.result-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;animation:slideUp .3s ease;position:relative;overflow:hidden}.result-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:3px 0 0 3px}.result-card.error::before{background:var(--accent2)}@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.result-timestamp{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}.emotion-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}.emotion-tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.04em}.result-text{font-size:13px;line-height:1.6;color:#ccc;font-family:'DM Mono',monospace;font-weight:300}.result-text strong{color:var(--text);font-weight:500}.em-happy{background:rgba(200,241,53,.15);color:var(--accent)}.em-sad{background:rgba(100,149,237,.15);color:#6495ED}.em-angry{background:rgba(255,77,109,.15);color:var(--accent2)}.em-surprised{background:rgba(255,180,50,.15);color:#ffb432}.em-neutral{background:rgba(180,180,180,.12);color:#aaa}.em-fearful{background:rgba(160,100,220,.15);color:#a064dc}.em-disgusted{background:rgba(80,200,120,.15);color:#50c878}.em-default{background:rgba(255,255,255,.07);color:#aaa}.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;text-align:center}.empty-icon{font-size:36px;opacity:.3}.empty-text{font-size:13px;color:var(--muted);line-height:1.5;font-family:'DM Mono',monospace}.loading-row{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}@keyframes spin{to{transform:rotate(360deg)}}#startScreen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center;z-index:10}.start-icon{font-size:48px}.start-title{font-size:22px;font-weight:800}.start-sub{font-size:13px;color:var(--muted);line-height:1.6;font-family:'DM Mono',monospace}.start-btn{margin-top:8px;padding:16px 36px;background:var(--accent);color:#0a0a0a;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.02em}.powered{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-top:4px}</style></head><body><div id="startScreen"><div class="start-icon">🫥</div><div class="start-title">FaceRead</div><div class="start-sub">Reconhecimento de rostos e expressões em tempo real.<br>Precisará de acesso à câmera.</div><button class="start-btn" onclick="initCamera()">Ativar Câmera</button><div class="powered">SOMALABS · POWERED BY GEMINI VISION</div></div><header><div class="logo"><div class="logo-mark">S</div><div class="logo-text"><span class="logo-title">FaceRead</span><span class="logo-sub">SOMALABS · VISION</span></div></div><div class="status-pill" id="statusPill"><div class="status-dot"></div><span id="statusText">aguardando</span></div></header><main><div class="camera-wrap" id="cameraWrap"><video id="video" autoplay playsinline muted></video><canvas id="canvas"></canvas><div class="cam-overlay" id="camOverlay"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div><div class="scan-line"></div></div><div class="cam-badge" id="camBadge">CÂMERA OFF</div><div class="no-face-badge" id="noFaceBadge">Nenhum rosto detectado</div></div><div class="controls"><button class="btn btn-primary" id="startBtn" onclick="startAnalysis()" disabled>▶ Iniciar Análise</button><button class="btn btn-stop" id="stopBtn" onclick="stopAnalysis()" style="display:none">■ Parar</button></div><div class="interval-row"><span class="interval-label">INTERVALO:</span><div class="interval-chips"><div class="chip" onclick="setInterval_(3000)" data-val="3000">3s</div><div class="chip active" onclick="setInterval_(5000)" data-val="5000">5s</div><div class="chip" onclick="setInterval_(10000)" data-val="10000">10s</div></div></div><div class="result-area" id="resultArea"><div class="empty-state" id="emptyState"><div class="empty-icon">👁</div><div class="empty-text">Inicie a análise para capturar<br>expressões em tempo real</div></div></div></main><script>let stream=null,analysisTimer=null,intervalMs=5000,isAnalyzing=false,frameCount=0;const video=document.getElementById('video'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),startBtn=document.getElementById('startBtn'),stopBtn=document.getElementById('stopBtn'),statusPill=document.getElementById('statusPill'),statusText=document.getElementById('statusText'),resultArea=document.getElementById('resultArea'),emptyState=document.getElementById('emptyState'),camBadge=document.getElementById('camBadge'),camOverlay=document.getElementById('camOverlay'),noFaceBadge=document.getElementById('noFaceBadge');async function initCamera(){document.getElementById('startScreen').style.display='none';try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});video.srcObject=stream;video.onloadedmetadata=()=>{canvas.width=video.videoWidth;canvas.height=video.videoHeight;setStatus('pronto','active');camBadge.textContent='AO VIVO';startBtn.disabled=false;}}catch(e){setStatus('erro câmera','');camBadge.textContent='ERRO';alert('Não foi possível acessar a câmera: '+e.message);}}function setStatus(t,c){statusText.textContent=t;statusPill.className='status-pill '+c;}function setInterval_(ms){intervalMs=ms;document.querySelectorAll('.chip').forEach(c=>{c.classList.toggle('active',parseInt(c.dataset.val)===ms);});if(isAnalyzing){clearInterval(analysisTimer);analysisTimer=setInterval(captureAndAnalyze,intervalMs);}}function startAnalysis(){if(!stream)return;isAnalyzing=true;startBtn.style.display='none';stopBtn.style.display='block';setStatus('analisando','analyzing');camOverlay.classList.add('scanning');if(emptyState)emptyState.remove();captureAndAnalyze();analysisTimer=setInterval(captureAndAnalyze,intervalMs);}function stopAnalysis(){isAnalyzing=false;clearInterval(analysisTimer);startBtn.style.display='block';stopBtn.style.display='none';setStatus('pronto','active');camOverlay.classList.remove('scanning');}function captureFrame(){ctx.save();ctx.translate(canvas.width,0);ctx.scale(-1,1);ctx.drawImage(video,0,0,canvas.width,canvas.height);ctx.restore();return canvas.toDataURL('image/jpeg',0.85).split(',')[1];}async function captureAndAnalyze(){if(!isAnalyzing)return;frameCount++;const fId=frameCount,ts=new Date().toLocaleTimeString('pt-BR'),el=document.createElement('div');el.className='loading-row';el.id='loading-'+fId;el.innerHTML='<div class="spinner"></div><span>Analisando frame #'+fId+'...</span>';resultArea.prepend(el);const img=captureFrame();try{const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:img})});const d=await r.json();let raw=(d.text||'{}').replace(/```json|```/g,'').trim();const jsonMatch=raw.match(/\{[\s\S]*\}/);if(jsonMatch)raw=jsonMatch[0];let p;try{p=JSON.parse(raw);}catch{p=null;}document.getElementById('loading-'+fId)?.remove();if(!p){addErr(fId,ts,'Erro ao interpretar resposta');return;}if(p.faces_detected===0){noFaceBadge.style.opacity='1';setTimeout(()=>noFaceBadge.style.opacity='0',2500);}addCard(fId,ts,p);}catch(e){document.getElementById('loading-'+fId)?.remove();addErr(fId,ts,e.message);}}const eMap={'feliz':'em-happy','alegre':'em-happy','sorrindo':'em-happy','happy':'em-happy','triste':'em-sad','sad':'em-sad','raiva':'em-angry','irritado':'em-angry','angry':'em-angry','surpreso':'em-surprised','surprised':'em-surprised','neutro':'em-neutral','neutral':'em-neutral','medo':'em-fearful','nojo':'em-disgusted'};function eCls(e){const k=e.toLowerCase();for(const[key,v]of Object.entries(eMap))if(k.includes(key))return v;return'em-default';}function confDot(c){const cols={alta:'#c8f135',media:'#ffb432',baixa:'#ff4d6d'};return'<span style="color:'+(cols[c]||'#aaa')+';font-size:10px">● '+c+'</span>';}function addCard(fId,ts,data){const card=document.createElement('div');card.className='result-card';const tags=(data.emotions||[]).map(e=>'<span class="emotion-tag '+eCls(e)+'">'+e+'</span>').join('');const n=data.faces_detected||0;const desc=data.description||'Sem descrição disponível';const eng=data.engagement||'neutro';const conf=data.confidence||'baixa';card.innerHTML='<div class="result-header"><span style="font-size:11px;font-weight:700">'+(n>0?'👤 '+n+' rosto'+(n>1?'s':''):'🚫 sem rosto')+' · #'+fId+'</span><span class="result-timestamp">'+ts+'</span></div>'+(tags?'<div class="emotion-tags">'+tags+'</div>':'')+'<div class="result-text">'+desc+(n>0?'<br><br><strong>Engajamento:</strong> '+eng+' · '+confDot(conf):'')+'</div>';resultArea.prepend(card);trim();}function addErr(fId,ts,msg){const card=document.createElement('div');card.className='result-card error';card.innerHTML='<div class="result-header"><span style="font-size:11px;font-weight:700;color:var(--accent2)">⚠ Erro · #'+fId+'</span><span class="result-timestamp">'+ts+'</span></div><div class="result-text" style="color:var(--accent2)">'+msg+'</div>';resultArea.prepend(card);trim();}function trim(){const c=resultArea.querySelectorAll('.result-card');if(c.length>20)c[c.length-1].remove();}</script></body></html>
